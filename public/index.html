<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Migrate SourceForge projects to GitHub with one click">
  <meta name="theme-color" content="#0d1117">
  <title>SF2GH Migrator</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-content">
        <div class="logo">
          <svg class="logo-icon" viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="16 18 22 12 16 6"></polyline>
            <polyline points="8 6 2 12 8 18"></polyline>
            <line x1="12" y1="2" x2="12" y2="22" opacity="0.3"></line>
          </svg>
          <div>
            <h1>SF2GH Migrator</h1>
            <p class="subtitle">Migrate SourceForge projects to GitHub</p>
          </div>
        </div>
        <div class="health-status" id="healthStatus">
          <span class="status-dot"></span>
          <span class="status-text">Checking...</span>
        </div>
      </div>
    </header>

    <main class="main">
      <section class="card">
        <h2 class="card-title">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
          Authentication
        </h2>
        <div class="form-group">
          <label for="githubToken">GitHub Personal Access Token</label>
          <div class="input-wrapper">
            <input type="password" id="githubToken" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false">
            <button type="button" class="btn-icon" id="toggleToken" title="Toggle visibility">
              <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
            </button>
          </div>
          <small class="help-text">Needs <code>repo</code> scope. <a href="https://github.com/settings/tokens/new?scopes=repo&description=SF2GH+Migrator" target="_blank" rel="noopener">Create one →</a></small>
        </div>
      </section>

      <section class="card">
        <h2 class="card-title">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
          Source Repositories
        </h2>
        <div class="form-group">
          <label for="sourceUrls">SourceForge URLs <span class="label-hint">(one per line)</span></label>
          <textarea id="sourceUrls" rows="5" placeholder="https://sourceforge.net/projects/my-project/&#10;https://git.code.sf.net/p/another-project/code&#10;https://svn.code.sf.net/p/legacy-project/code"></textarea>
        </div>
      </section>

      <section class="card">
        <h2 class="card-title">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
          Options
        </h2>
        <div class="form-row">
          <div class="form-group">
            <label for="targetOrg">Target Organization <span class="label-hint">(optional)</span></label>
            <input type="text" id="targetOrg" placeholder="Leave empty for personal repos">
          </div>
        </div>
        <div class="form-group">
          <label class="checkbox-label">
            <input type="checkbox" id="privateRepos">
            <span class="checkbox-custom"></span>
            Create as private repositories
          </label>
        </div>
      </section>

      <div class="actions">
        <button class="btn btn-secondary" id="btnDryRun" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          Dry Run (Preview)
        </button>
        <button class="btn btn-primary" id="btnMigrate" disabled>
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          Migrate to GitHub
        </button>
      </div>

      <section class="card output-section" id="outputSection" hidden>
        <h2 class="card-title">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></svg>
          Output
        </h2>
        <div class="output-log" id="outputLog"></div>
      </section>
    </main>

    <footer class="footer">
      <p>SF2GH Migrator &middot; MIT License &middot; <a href="https://github.com/socrtwo/sf-to-github" target="_blank" rel="noopener">Source Code</a></p>
    </footer>
  </div>

  <!-- isomorphic-git: pure-JS git for mobile (Capacitor) migration without a server -->
  <!-- These are loaded from CDN and cached after the first connection. -->
  <script src="https://unpkg.com/@isomorphic-git/lightning-fs@4.6.0/dist/lightning-fs.min.js"></script>
  <script src="https://unpkg.com/isomorphic-git@1.27.1/index.umd.min.js"></script>
  <script src="https://unpkg.com/isomorphic-git@1.27.1/http/web/index.umd.js"></script>
  <script src="/js/mobile-migrate.js"></script>
  <script src="/js/app.js"></script>
</body>
</html>
