appId: com.sf2gh.migrator
productName: SF2GH Migrator
directories:
  output: dist
files:
  - src/**/*
  - electron/**/*
  - public/**/*
  - package.json
mac:
  category: public.app-category.developer-tools
  target:
    - dmg
    - zip
  icon: public/icons/icon-512.png
win:
  target:
    - nsis
    - portable
  icon: public/icons/icon-512.png
linux:
  target:
    - AppImage
    - deb
    - rpm
  category: Development
  icon: public/icons/icon-512.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
