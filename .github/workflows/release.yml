name: Build & Release All Platforms

# Triggers when you push a version tag like v1.0.0
# or manually via GitHub Actions → "Run workflow"
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.0.0)'
        required: true

jobs:
  # ─── Windows installer + portable exe ────────────────────────────────────────
  build-windows:
    name: Windows
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Windows installer & portable
        run: npm run electron:build -- --win --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe
            dist/*.appx
          if-no-files-found: warn

  # ─── macOS DMG + zip ─────────────────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build macOS DMG & zip
        run: npm run electron:build -- --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  # ─── Linux AppImage, deb, rpm ─────────────────────────────────────────────────
  build-linux:
    name: Linux
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install Linux packaging tools
        run: sudo apt-get install -y fakeroot dpkg rpm
      - run: npm ci
      - name: Build Linux packages
        run: npm run electron:build -- --linux --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: warn

  # ─── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      # Capacitor Android v7 requires Java 21
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      # Install Capacitor Android platform (version-pinned to match @capacitor/core)
      - run: npm install @capacitor/android@^7 --no-save
      - name: Initialize Capacitor Android project
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             "SF2GH-Migrator-${VERSION}-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: '*.apk'

  # ─── iOS (unsigned — sideloadable with AltStore / TestFlight via Xcode) ──────
  build-ios:
    name: iOS
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      # Install Capacitor iOS platform (version-pinned to match @capacitor/core)
      - run: npm install @capacitor/ios@^7 --no-save
      - name: Initialize Capacitor iOS project
        run: |
          npx cap add ios 2>/dev/null || true
          npx cap sync ios
      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install
      - name: Build iOS archive (unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/App/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package as IPA
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          mkdir -p Payload
          cp -r ios/App/App.xcarchive/Products/Applications/App.app Payload/
          zip -r "SF2GH-Migrator-${VERSION}-ios-unsigned.ipa" Payload/
          rm -rf Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: '*.ipa'

  # ─── Web (self-hostable zip of the full app) ─────────────────────────────────
  build-web:
    name: Web
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --omit=dev
      - name: Package web app
        run: |
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          zip -r "SF2GH-Migrator-${VERSION}-web.zip" \
            src/ public/ package.json README.md LICENSE \
            --exclude "node_modules/*"
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: '*.zip'

  # ─── Create GitHub Release with all artifacts ─────────────────────────────────
  release:
    name: Publish Release
    # Always run even if some platform builds failed — publish whatever succeeded
    if: always()
    needs: [build-windows, build-macos, build-linux, build-android, build-ios, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
        continue-on-error: true
      - name: List release files
        run: ls -lh release-files/ 2>/dev/null || echo "No artifacts to list"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # inputs.version is set when manually triggered; ref_name is the tag on push
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          name: 'SF2GH Migrator ${{ github.event.inputs.version || github.ref_name }}'
          generate_release_notes: true
          files: release-files/**/*
          body: |
            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows  | `*-Setup.exe` | Standard installer (recommended) |
            | Windows  | `*-Portable.exe` | No install needed, just run it |
            | macOS    | `*.dmg` | Drag to Applications |
            | Linux    | `*.AppImage` | Universal — works on any distro, just `chmod +x` and run |
            | Linux    | `*.deb` | Ubuntu / Debian |
            | Linux    | `*.rpm` | Fedora / Red Hat |
            | Android  | `*-android.apk` | Sideload: enable "Install unknown apps" in Settings |
            | iOS      | `*-ios-unsigned.ipa` | Install via AltStore or Apple TestFlight |
            | Web      | `*-web.zip` | Extract and run `npm install && npm start`, then open http://localhost:3000 |

            > **Mobile / browser users:** The Android APK and iOS IPA run the migration entirely on-device — no server needed.
            > The web zip requires Node.js to run the server. For browser-only use, open the app in any modern browser and it will automatically switch to client-side mode if the server is unavailable.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
