name: Build & Release All Platforms

# Triggers when you push a version tag like v1.0.0
# or manually via GitHub Actions → "Run workflow"
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to release (e.g. v1.0.0)'
        required: true

jobs:
  # ─── Windows x64 + ARM64 + App Store (AppX) ──────────────────────────────────
  build-windows:
    name: Windows (x64 + ARM64 + AppX)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Windows x64 + ARM64 installer, portable & App Store package
        run: npm run electron:build -- --win --x64 --arm64 --publish never
      - name: Sign Windows executables with Azure Trusted Signing
        uses: azure/trusted-signing-action@v0
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: ${{ secrets.AZURE_SIGNING_ENDPOINT }}
          trusted-signing-account-name: ${{ secrets.AZURE_SIGNING_ACCOUNT }}
          certificate-profile-name: ${{ secrets.AZURE_SIGNING_PROFILE }}
          files-folder: dist
          files-folder-filter: exe,appx,msix
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.exe
            dist/*.msi
            dist/*.appx
            dist/*.msix
          if-no-files-found: warn

  # ─── macOS DMG + zip ─────────────────────────────────────────────────────────
  build-macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build macOS DMG & zip
        run: npm run electron:build -- --mac --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            dist/*.dmg
            dist/*.zip
          if-no-files-found: warn

  # ─── Linux x64 + ARM64 — AppImage, deb, rpm ───────────────────────────────────
  build-linux:
    name: Linux (x64 + ARM64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Build Linux x64 + ARM64 packages
        run: npm run electron:build -- --linux --x64 --arm64 --publish never
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: warn

  # ─── Linux Flatpak (works on any distro incl. Steam Deck) ────────────────────
  build-flatpak:
    name: Linux (Flatpak)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Cache Flatpak runtime
        uses: actions/cache@v4
        with:
          path: /var/lib/flatpak
          key: flatpak-freedesktop-22.08
      - name: Install Flatpak tools & runtime
        run: |
          sudo apt-get update -y
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          sudo flatpak install -y flathub org.freedesktop.Platform//22.08 org.freedesktop.Sdk//22.08
      - name: Verify Flatpak runtime is accessible
        run: |
          mkdir -p /tmp/flatpak-test
          flatpak build-init /tmp/flatpak-test com.test.Diagnostic org.freedesktop.Sdk org.freedesktop.Platform 22.08 2>&1 && echo "Runtime OK" || echo "Runtime NOT FOUND — this is the root cause"
          flatpak list --runtime 2>&1 || true
      - run: npm ci
      - name: Build Flatpak
        run: npm run electron:build -- --linux flatpak --publish never 2>&1 | tee /tmp/flatpak-build.log; exit ${PIPESTATUS[0]}
      - name: Upload Flatpak build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flatpak-debug-log
          path: /tmp/flatpak-build.log
      - uses: actions/upload-artifact@v4
        with:
          name: flatpak
          path: dist/*.flatpak
          if-no-files-found: warn

  # ─── Android APK ─────────────────────────────────────────────────────────────
  build-android:
    name: Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - run: npm ci
      - name: Install Capacitor Android platform
        run: npm install @capacitor/android@^7
      - name: Initialize Capacitor Android project
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android
      - name: Build debug APK
        working-directory: android
        run: ./gradlew assembleDebug
      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          mv android/app/build/outputs/apk/debug/app-debug.apk \
             "SF2GH-Migrator-${VERSION}-android.apk"
      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: '*.apk'

  # ─── iOS (unsigned — sideloadable with AltStore / TestFlight via Xcode) ──────
  build-ios:
    name: iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Install Capacitor iOS platform
        run: npm install @capacitor/ios@^7
      - name: Initialize Capacitor iOS project
        run: |
          npx cap add ios 2>/dev/null || true
          npx cap sync ios
      - name: Install CocoaPods dependencies
        working-directory: ios/App
        run: pod install
      - name: Build iOS archive (unsigned)
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ios/App/App.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
      - name: Package as IPA
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          mkdir -p Payload
          cp -r ios/App/App.xcarchive/Products/Applications/App.app Payload/
          zip -r "SF2GH-Migrator-${VERSION}-ios-unsigned.ipa" Payload/
          rm -rf Payload
      - uses: actions/upload-artifact@v4
        with:
          name: ios
          path: '*.ipa'

  # ─── Web (self-hostable zip of the full app) ─────────────────────────────────
  build-web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --omit=dev
      - name: Package web app
        run: |
          VERSION="${{ github.ref_name || github.event.inputs.version }}"
          zip -r "SF2GH-Migrator-${VERSION}-web.zip" \
            src/ public/ package.json README.md LICENSE \
            --exclude "node_modules/*" 2>/dev/null || \
          zip -r "SF2GH-Migrator-${VERSION}-web.zip" \
            src/ public/ package.json README.md \
            --exclude "node_modules/*" 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: '*.zip'

  # ─── Create GitHub Release with all artifacts ────────────────────────────────
  release:
    name: Publish Release
    needs: [build-windows, build-macos, build-linux, build-flatpak, build-android, build-ios, build-web]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true
      - name: List release files
        run: ls -lh release-files/
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.version }}
          name: 'SF2GH Migrator ${{ github.ref_name || github.event.inputs.version }}'
          generate_release_notes: true
          files: release-files/**/*
          body: |
            ## Downloads

            | Platform | File | Notes |
            |----------|------|-------|
            | Windows x64 | `*-Setup.exe` | Standard installer |
            | Windows x64 | `*-Portable.exe` | No install needed, just run it |
            | Windows ARM64 | `*-arm64-Setup.exe` | Surface Pro X, ARM laptops |
            | Windows App Store | `*.appx` | Sideload or submit to Microsoft Store |
            | macOS | `*.dmg` | Drag to Applications |
            | Linux x64 | `*.AppImage` | Universal — works on any distro |
            | Linux ARM64 | `*-arm64.AppImage` | Raspberry Pi, ARM servers |
            | Linux x64 | `*.deb` | Ubuntu / Debian |
            | Linux x64 | `*.rpm` | Fedora / Red Hat |
            | Linux | `*.flatpak` | Flatpak — Steam Deck, GNOME Software |
            | Android | `*-android.apk` | Sideload via Settings → Install unknown apps |
            | iOS | `*-ios-unsigned.ipa` | Install via AltStore or TestFlight |
            | Web | `*-web.zip` | Self-host with `npm start` |
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
